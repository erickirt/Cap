name: "publish"

# Stable release entrypoint. Reads the version from Cargo.toml (bump it before
# dispatching) and hands off to the reusable desktop-release workflow. The
# CrabNebula release stays a draft; publishing remains the manual step it has
# always been (Discord bot / CN dashboard).

on:
  workflow_dispatch:
    inputs:
      interactionId:
        description: "Discord Interaction ID"
        required: false
        type: string

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read_version.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version number
        uses: SebRollen/toml-action@v1.0.2
        id: read_version
        with:
          file: apps/desktop/src-tauri/Cargo.toml
          field: "package.version"

  release:
    needs: version
    permissions:
      contents: write
      actions: read
      id-token: write
    uses: ./.github/workflows/desktop-release.yml
    with:
      version: ${{ needs.version.outputs.version }}
      channel: stable
      sha: ${{ github.sha }}
      auto_publish: false
      interactionId: ${{ inputs.interactionId }}
    secrets: inherit
